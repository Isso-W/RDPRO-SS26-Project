[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "jiaozi"
version = "0.1.0"
description = "Integrated CV Auto-DL pipeline with retrieval and Module 4 code generation."
readme = "README.md"
requires-python = ">=3.10"
authors = [
  { name = "Jiaozi Project Team" }
]
dependencies = [
  "chromadb",
  "datasets",
  "networkx",
  "numpy",
  "openai>=2.0.0",
  "pandas",
  "pillow",
  "sentence-transformers",
  "torch",
  "torchvision",
  "transformers",
  "mcp[cli]>=1.2.0",
  "kaggle>=1.6.0",
]

[project.scripts]
jiaozi-mcp = "mcp_server.server:main"
jiaozi-knowledge-learn = "agents.knowledge_learner_agent:main"
jiaozi-mle-agent = "agents.mle_experiment_agent:main"

[project.optional-dependencies]
dev = [
  "pytest"
]

[tool.setuptools.packages.find]
include = [
  "agents*",
  "analyzer*",
  "autopipeline*",
  "features*",
  "ingestion*",
  "knowledge*",
  "mcp_server*",
  "module4_agent*",
  "processors*",
  "recommender*",
  "retrieval*",
]
